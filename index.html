<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeZone</title>
  </head>
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="modal-close" class="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>
  <body>
    <header>
      <h1>The AnimeZone</h1>
      <input type="search" placeholder="Search anime..." id="search-input"/>
      <a href="#favorites">Favorites</a>
    </header>
    <main>
      <section class="controls">
        <label for="filter-genre">Genre:</label>
        <select id="filter-genre">
          <option value="">All genres</option>
          <option value="action">Action</option>
          <option value="adventure">Adventure</option>
          <option value="drama">Drama</option>
          <option value="horror">Horror</option>
        </select>
        
        <label for="filter-type">Type:</label>
        <select id="filter-type">
          <option value="">All types</option>
          <option value="TV">TV</option>
          <option value="Movie">Movie</option>
          <option value="OVA">OVA</option>
          <option value="ONA">ONA</option>
          <option value="Special">Special</option>
        </select>

        <label for="sort-anime">Sort by:</label>
        <select id="sort-anime">
          <option value="title">Title</option>
          <option value="score">Score</option>
          <option value="release-date">Release Date</option>
          <option value="date-added">Date added</option>
        </select>
      </section>

      <section id="anime-list">
        <!-- anime cards will be added here by JavaScript -->
      </section>

      <section id="favorites">
        <h2>Favorites</h2>
        <!-- favorite anime cards will be added here by JavaScript -->
      </section>

    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
